<!doctype html>
<html lang="fr-BE">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="google-site-verification" content="SQKULWK04oQlZVdRZz8H2qoyJoY7vpbumgCuS6Gi54g" />
  <title>Actualités | Lucky Réparations & Créations</title>
  <meta name="description" content="Actualités, nouveautés et informations de Lucky Réparations & Créations à Mouscron, Tournai et environs.">
  <link rel="canonical" href="https://lucky-reparations-creations.pages.dev/actualites/">
  <link rel="icon" href="/assets/logo.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="/">
    <img src="/assets/logo.png" alt="Lucky Réparations & Créations">
    <span>Lucky Réparations & Créations</span>
  </a>
  <nav>
    <a href="/">Accueil</a>
    <a href="/services/">Services</a>
    <a href="/galerie/">Galerie</a>
    <a href="/actualites/">Actualités</a>
    <a href="/contact/">Contact</a>
    <a class="cta" href="/devis/">Demander un devis</a>
  </nav>
</header>

<main>
  <section class="page-hero">
    <div class="container">
      <h1>Actualités</h1>
      <p>Nouveautés, informations et publications récentes.</p>
    </div>
  </section>

  <section>
    <div class="container">
      <div class="grid services" id="actualitesGrid">
        <article class="card"><p>Chargement des actualités...</p></article>
      </div>
    </div>
  </section>
</main>

<script>
async function loadActualites(){
  const grid = document.getElementById("actualitesGrid");
  try{
    const response = await fetch("/content/actualites.json?ts=" + Date.now(), {cache:"no-store"});
    if(!response.ok) throw new Error("content/actualites.json introuvable");
    const json = await response.json();
    const items = Array.isArray(json) ? json : (json.body || json.actualites || []);
    items.sort((a,b)=>new Date(b.date || 0) - new Date(a.date || 0));

    if(!items.length){
      grid.innerHTML = `<article class="card"><h3>Aucune actualité pour le moment</h3><p>Les prochaines publications apparaîtront ici.</p></article>`;
      return;
    }

    grid.innerHTML = items.map(item => `
      <article class="card news-card">
        ${item.image ? `<img src="${item.image}" alt="${item.title || 'Actualité'}" loading="lazy">` : ""}
        <h3>${item.title || "Actualité"}</h3>
        ${item.date ? `<p><strong>${String(item.date).slice(0,10)}</strong></p>` : ""}
        <p>${item.excerpt || item.text || item.description || ""}</p>
      </article>
    `).join("");
  }catch(error){
    grid.innerHTML = `<article class="card"><h3>Aucune actualité publiée</h3><p>Publie une première actualité depuis le back-office, puis clique sur Publier.</p></article>`;
  }
}
document.addEventListener("DOMContentLoaded", loadActualites);
</script>
</body>
</html>
