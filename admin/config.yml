backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://lucky-reparations-creations.netlify.app"
display_url: "https://lucky-reparations-creations.netlify.app"
logo_url: "/assets/logo.png"

collections:
  - name: "realisations"
    label: "Réalisations"
    files:
      - label: "Galerie"
        name: "galerie"
        file: "content/realisations.json"
        fields:
          - label: "Réalisations"
            name: "body"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - label: "Catégorie"
                name: "category"
                widget: "select"
                options:
                  - {label: "Réparations", value: "reparations"}
                  - {label: "Impression 3D", value: "impression3d"}
                  - {label: "Gravure laser", value: "laser"}
                  - {label: "Découpe laser", value: "decoupe"}
                  - {label: "Créations", value: "creations"}
              - {label: "Icône", name: "icon", widget: "string", required: false, hint: "Exemple : 🔧, 🖨️, 🔥"}
              - {label: "Description courte", name: "description", widget: "text"}
              - {label: "Image principale", name: "image", widget: "image"}
              - {label: "Matériaux / appareil", name: "details", widget: "string", required: false}
              - {label: "Mettre à la une", name: "featured", widget: "boolean", required: false, default: false}
              - {label: "Date", name: "date", widget: "datetime", required: false}
  - name: "avis"
    label: "Avis clients"
    files:
      - label: "Avis"
        name: "avis"
        file: "content/avis.json"
        fields:
          - label: "Avis"
            name: "body"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "Nom", name: "name", widget: "string"}
              - {label: "Note", name: "rating", widget: "number", min: 1, max: 5}
              - {label: "Commentaire", name: "text", widget: "text"}
  - name: "actualites"
    label: "Actualités"
    files:
      - label: "Articles"
        name: "actualites"
        file: "content/actualites.json"
        fields:
          - label: "Articles"
            name: "body"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Date", name: "date", widget: "datetime"}
              - {label: "Résumé", name: "excerpt", widget: "text"}
              - {label: "Image", name: "image", widget: "image", required: false}
