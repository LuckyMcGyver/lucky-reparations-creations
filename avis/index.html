<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function() {
      const hash = window.location.hash || "";
      if (hash.includes("invite_token=") || hash.includes("recovery_token=") || hash.includes("confirmation_token=")) {
        window.netlifyIdentity.open();
      }
    });
    window.netlifyIdentity.on("login", function() {
      if (window.location.pathname.startsWith("/admin")) window.location.reload();
      else window.netlifyIdentity.close();
    });
  }
</script>
